version: "3.9"

services:

  mysql:

    image: mysql:8.4

    container_name: cab-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ranjhanaa
      MYSQL_DATABASE: cab_booking_db

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  cab-app:

    build: .

    container_name: cab-booking-app

    restart: always

    depends_on:
      - mysql

    ports:
      - "8088:8088"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cab_booking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ranjhanaa

volumes:

  mysql-data: